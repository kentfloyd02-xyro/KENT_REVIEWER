<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KENT Prelim Reviewer Exam</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:700px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    overflow:hidden;
}

header{
    background:#4b2fa5;
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.quiz{
    padding:30px;
}

#question{
    font-size:22px;
    margin-bottom:25px;
}

.choice{
    display:block;
    width:100%;
    padding:15px;
    margin:12px 0;
    background:#eee;
    border:none;
    border-radius:6px;
    cursor:pointer;
    text-align:left;
    font-size:17px;
    transition:.3s;
}

.choice:hover{
    background:#ddd;
}

.correct{
    background:#4CAF50 !important;
    color:white;
}

.wrong{
    background:#E53935 !important;
    color:white;
}

#feedback{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.bottom{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#score{
    font-size:18px;
    font-weight:bold;
}

#next, #continueBtn, #restartBtn{
    padding:12px 25px;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:15px;
}

#next, #continueBtn{
    background:#4b2fa5;
}

#restartBtn{
    background:#E53935;
    margin-left:10px;
}

#next{
    display:none;
}
</style>

</head>
<body>

<div class="container">

    <header>
       PUTANGINA NIYO PAG KINALAT
    </header>

    <div class="quiz">

        <h2 id="question"></h2>

        <div id="choices"></div>

        <div id="feedback"></div>

        <div class="bottom">
            <div id="score">Score: 0</div>
            <button id="next">Next</button>
        </div>

    </div>

</div>

<script src="main.js"></script>

</body>
</html>
